{% extends "base.html" %}
{% block title %}Login — HANA Admin{% endblock %}
{% block body %}
<form class="login" method="post">
    <div class="brand" style="font-size:20px;font-weight:700;margin-bottom:6px;">🌸 HANA Admin</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Sign in to observe user logs.</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>Password</label>
    <input type="password" name="password" autofocus autocomplete="current-password">
    <button class="btn" type="submit">Sign in</button>
</form>
{% endblock %}
